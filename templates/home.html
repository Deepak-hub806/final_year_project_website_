<!DOCTYPE html>
<html>
<head>
    <title>VIT AI Student Support</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .nav h2 {
            font-family: Poppins;
        }

        .nav a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            background: #2563eb;
        }

        .hero {
            text-align: center;
            margin-top: 120px;
        }

        .hero h1 {
            font-family: Poppins;
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            color: #cbd5f5;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px 28px;
            background: white;
            color: #2563eb;
            border-radius: 10px;
            text-decoration: none;
            margin: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="nav">
    <h2>VIT Support</h2>
    <div>
        <a href="/login">Login</a>
        <a href="/signup">Sign Up</a>
    </div>
</div>

<div class="hero">
    <h1>AI-Powered Student Support System</h1>
    <p>Smart academic tools, analytics and assistance in one platform</p>

    <a href="/login" class="btn">Get Started</a>
</div>

</body>
</html>
